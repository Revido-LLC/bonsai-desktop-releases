name: Release Desktop

# Builds the UNSIGNED universal macOS DMG and publishes it here (this public repo).
# Source lives in a PRIVATE repo, pulled via a READ-ONLY deploy key — so no broad
# cross-repo token exists anywhere; this repo's own GITHUB_TOKEN publishes the release.
#
# Run from the Actions tab or:
#   gh workflow run release.yml --repo Revido-LLC/bonsai-desktop-releases \
#     -f version=0.2.1 -f ref=v0.2.1
#
# Secrets (this repo):
#   PRIVATE_REPO_DEPLOY_KEY    read-only SSH deploy key for Revido-LLC/bonsai-browser-api
#   DESKTOP_SUPABASE_URL       public Supabase URL (baked into the bundle)
#   DESKTOP_SUPABASE_ANON_KEY  public anon key (RLS-scoped; safe to embed)
#   DESKTOP_BACKEND_URL        (optional) backend URL; defaults to Railway prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, e.g. 0.2.1 (no leading v)"
        required: true
      ref:
        description: "Source ref in the private repo to build (tag/branch/SHA)"
        required: true
        default: main

permissions:
  contents: write   # explicit → elevates GITHUB_TOKEN to create the release here

jobs:
  build-mac:
    name: Build + publish macOS DMG
    runs-on: macos-14
    steps:
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s' "$VERSION" | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be semver like 0.2.1"; exit 1
          fi

      - name: Checkout private source (read-only deploy key)
        uses: actions/checkout@v4
        with:
          repository: Revido-LLC/bonsai-browser-api
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/desktop/package-lock.json

      - name: Install + build library
        run: |
          npm ci
          npm run build

      - name: Install desktop deps
        run: npm ci
        working-directory: apps/desktop

      - name: Write build .env
        working-directory: apps/desktop
        env:
          SUPABASE_URL: ${{ secrets.DESKTOP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.DESKTOP_SUPABASE_ANON_KEY }}
          BONSAI_BACKEND_URL: ${{ secrets.DESKTOP_BACKEND_URL }}
        run: |
          {
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_ANON_KEY=%s\n' "$SUPABASE_ANON_KEY"
            if [ -n "$BONSAI_BACKEND_URL" ]; then
              printf 'BONSAI_BACKEND_URL=%s\n' "$BONSAI_BACKEND_URL"
            fi
          } > .env

      - name: Set version
        working-directory: apps/desktop
        env:
          VERSION: ${{ inputs.version }}
        run: npm version "${VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Build DMG (unsigned, universal)
        working-directory: apps/desktop
        run: |
          npm run bundle
          npx electron-builder --config electron-builder.cjs --mac --universal \
            -c.directories.output=release

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          V="${VERSION#v}"
          gh release create "v$V" \
            --repo "$REPO" \
            --title "Bonsai $V" \
            --notes "Bonsai desktop $V. Unsigned build — first launch needs a one-time Gatekeeper bypass; see the README." \
            apps/desktop/release/*.dmg
